<!DOCTYPE html>
<html lang='en'>

<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>HMS Login</title>
    <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' rel='stylesheet'>
    <style>
        body {
            background-color: #f0f4f8;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            background: #fff;
        }

        .brand-header {
            background-color: #0d6efd;
            color: white;
            padding: 2rem;
            border-radius: 12px 12px 0 0;
            text-align: center;
        }

        .brand-header h2 {
            font-weight: 700;
            margin: 0;
        }

        .brand-header p {
            margin: 0;
            opacity: 0.8;
            font-size: 0.9rem;
        }

        .card-body {
            padding: 2.5rem;
        }

        .form-control {
            border-radius: 8px;
            padding: 0.75rem;
        }

        .btn-primary {
            border-radius: 8px;
            padding: 0.75rem;
            font-weight: 600;
            background-color: #0d6efd;
            border: none;
        }

        .role-selector {
            margin-bottom: 1.5rem;
        }

        .footer-links {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #6c757d;
        }
    </style>
</head>

<body>
    <div class='login-card'>
        <div class='brand-header'>
            <h2>MediCare HMS</h2>
            <p>Hospital Management System V2</p>
        </div>
        <div class='card-body'>
            <form id='loginForm'>
                <div class='role-selector'><label class='form-label fw-bold'>Select Your Role</label><select
                        class='form-select' id='roleSelect'>
                        <option value='patient'>Patient</option>
                        <option value='doctor'>Doctor</option>
                        <option value='admin'>Administrator</option>
                    </select></div>
                <div class='mb-3'><label for='username' class='form-label fw-bold'>Username / Email</label><input
                        type='text' class='form-control' id='username' placeholder='Enter your username' required></div>
                <div class='mb-4'><label for='password' class='form-label fw-bold'>Password</label><input
                        type='password' class='form-control' id='password' placeholder='••••••••' required></div>
                <div class='d-grid mb-3'><button type='submit' class='btn btn-primary'>Sign In</button></div>
                <div class='d-flex justify-content-between footer-links'><a href='#' class='text-decoration-none'>Forgot
                        Password?</a><a href='#' class='text-decoration-none'>Create Account</a></div>
            </form>
        </div>
        <div class='text-center pb-4 text-muted' style='font-size: 0.75rem;'>&copy; 2023 Comprehensive Hospital
            Management System</div>
    </div>
    <script src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js'></script>
</body>

</html>
